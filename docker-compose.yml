version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # MBA T-Shirt Factory backend
      - DATABASE_URL=sqlite+aiosqlite:///./data/mba.db
      - API_TOKEN=${API_TOKEN:?API_TOKEN is required}
      # T-Shirt Factory (TSF_-prefixed vars loaded from .env)
      - TSF_ANTHROPIC_API_KEY=${TSF_ANTHROPIC_API_KEY:-}
      - TSF_ANTHROPIC_MODEL=${TSF_ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - TSF_AMAZON_MARKETPLACE=${TSF_AMAZON_MARKETPLACE:-com}
      - TSF_RESEARCH_INTERVAL_HOURS=${TSF_RESEARCH_INTERVAL_HOURS:-24}
      - TSF_MBA_TIER=${TSF_MBA_TIER:-100}
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://mba.ooopppmmm.com/api
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  mcp:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    expose:
      - "9000"
    environment:
      - MBA_API_URL=http://backend:8000
      - MBA_API_TOKEN=${API_TOKEN:?API_TOKEN is required}
      - MCP_PORT=9000
      - MCP_PUBLIC_URL=${MCP_PUBLIC_URL:-https://mcp.mba.ooopppmmm.com}
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
